name: Firebase Deployment Gate

# This workflow watches for Firebase App Hosting to complete its deployment.
# When Firebase succeeds, it fires a repository_dispatch event to trigger
# the Docker build pipeline in ci-cd.yml.
# If Firebase fails, the Docker pipeline is never started.

on:
  push:
    branches: [ "main" ]

jobs:
  wait-and-gate:
    name: Wait for Firebase & Trigger Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: read
      checks: read

    steps:
      - name: Debug - Show what GitHub knows about this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "==> Commit: $COMMIT_SHA"
          echo "==> Waiting 90 seconds for Firebase to register its status..."
          sleep 90

          echo ""
          echo "--- Commit Statuses ---"
          gh api "repos/${REPO}/commits/${COMMIT_SHA}/statuses" \
            --jq '.[] | "\(.context): \(.state)"' || echo "(none)"

          echo ""
          echo "--- Check Runs ---"
          gh api "repos/${REPO}/commits/${COMMIT_SHA}/check-runs" \
            --jq '.check_runs[] | "\(.name): \(.status) / \(.conclusion)"' || echo "(none)"

          echo ""
          echo "--- Deployments for this SHA ---"
          gh api "repos/${REPO}/deployments?sha=${COMMIT_SHA}" \
            --jq '.[].id' | while read ID; do
              STATE=$(gh api "repos/${REPO}/deployments/${ID}/statuses?per_page=1" \
                --jq '.[0].state // "pending"')
              echo "  deployment $ID: $STATE"
            done || echo "(none)"

      - name: Wait for Firebase App Hosting Deployment
        id: firebase-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "==> Polling for Firebase App Hosting status on commit $COMMIT_SHA..."

          MAX_RETRIES=60  # 60 x 10s = 10 minutes
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT+1))

            # Check 1: Commit statuses (Firebase posts "firebase-hosting/..." or similar)
            STATUS=$(gh api "repos/${REPO}/commits/${COMMIT_SHA}/statuses" \
              --jq '[.[] | select(.context | ascii_downcase | test("firebase|hosting|apphosting|cloud.build"))] | .[0].state // ""')

            # Check 2: Check runs (Firebase may use GitHub Checks API)
            if [ -z "$STATUS" ] || [ "$STATUS" = "pending" ]; then
              CHECK=$(gh api "repos/${REPO}/commits/${COMMIT_SHA}/check-runs" \
                --jq '[.check_runs[] | select(.name | ascii_downcase | test("firebase|hosting|apphosting|cloud.build"))] | .[0] | "\(.status)/\(.conclusion // "")"' 2>/dev/null || echo "")

              if echo "$CHECK" | grep -q "completed/success"; then
                STATUS="success"
              elif echo "$CHECK" | grep -q "completed/failure\|completed/cancelled"; then
                STATUS="failure"
              fi
            fi

            echo "  Firebase status: '${STATUS}' (attempt ${RETRY_COUNT}/${MAX_RETRIES})"

            if [ "$STATUS" = "success" ]; then
              echo "==> Firebase deployment succeeded!"
              echo "firebase_status=success" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$STATUS" = "failure" ] || [ "$STATUS" = "error" ]; then
              echo "==> Firebase deployment FAILED. Docker pipeline will NOT start."
              echo "firebase_status=failure" >> "$GITHUB_OUTPUT"
              exit 1
            fi

            echo "  Still deploying... waiting 10 seconds."
            sleep 10
          done

          echo "==> Timed out. Docker pipeline will NOT start."
          exit 1

      - name: Trigger Docker Build Pipeline
        if: steps.firebase-check.outputs.firebase_status == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "==> Firebase succeeded! Triggering Docker build pipeline..."
          gh api \
            --method POST \
            "repos/${REPO}/dispatches" \
            --field event_type="firebase-deployment-succeeded" \
            --field client_payload[sha]="${{ github.sha }}" \
            --field client_payload[ref]="${{ github.ref }}"
          echo "==> Docker build pipeline triggered."
