name: Firebase Deployment Gate

# This workflow polls Firebase App Hosting via gcloud CLI to detect when
# the deployment for this commit finishes. On success, it fires a
# repository_dispatch to trigger the Docker build in ci-cd.yml.
# Firebase App Hosting does NOT post back to GitHub's APIs (no commit
# statuses, check-runs, or deployments), so gcloud is the only reliable
# way to check its status.
#
# REQUIRED SECRET:
#   GCP_SA_KEY — A Google Cloud Service Account JSON key with these roles:
#     - Firebase App Hosting Viewer  (or Firebase Admin)
#   Steps to create:
#     1. Go to: https://console.cloud.google.com/iam-admin/serviceaccounts
#        Project: we-are-family-221
#     2. Create a Service Account (or use existing)
#     3. Grant role: "Firebase App Hosting Admin" or "Firebase Admin"
#     4. Click the account → Keys → Add Key → JSON → Download
#     5. In GitHub repo → Settings → Secrets → Actions → New secret
#        Name: GCP_SA_KEY  |  Value: (paste entire JSON file contents)

on:
  push:
    branches: [ "main" ]

jobs:
  wait-and-gate:
    name: Wait for Firebase App Hosting
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: '>= 363.0.0'

      - name: Poll Firebase App Hosting Rollout
        id: firebase-check
        run: |
          echo "==> Waiting for Firebase App Hosting rollout to register..."
          echo "    Backend: wearefamily | Region: us-east4 | Project: we-are-family-221"
          sleep 60

          MAX_RETRIES=60  # 60 x 10s = up to 10 minutes
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT+1))

            # Get state of the most recent rollout for this backend
            STATE=$(gcloud firebase apphosting rollouts list \
              --project=we-are-family-221 \
              --backend=wearefamily \
              --location=us-east4 \
              --limit=1 \
              --format="value(state)" 2>/dev/null || echo "ERROR")

            echo "  Rollout state: '${STATE}' (attempt ${RETRY_COUNT}/${MAX_RETRIES})"

            case "$STATE" in
              SUCCEEDED|COMPLETED)
                echo "==> Firebase App Hosting deployed successfully!"
                echo "firebase_status=success" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              FAILED|CANCELLED)
                echo "==> Firebase deployment FAILED or was CANCELLED. Docker pipeline will NOT start."
                echo "firebase_status=failure" >> "$GITHUB_OUTPUT"
                exit 1
                ;;
              ERROR)
                echo "  Warning: gcloud command failed (check GCP_SA_KEY). Retrying..."
                ;;
            esac

            echo "  Still deploying... waiting 10 seconds."
            sleep 10
          done

          echo "==> Timed out after 10 minutes. Docker pipeline will NOT start."
          exit 1

      - name: Trigger Docker Build Pipeline
        if: steps.firebase-check.outputs.firebase_status == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "==> Firebase succeeded! Triggering Docker build pipeline..."
          gh api \
            --method POST \
            "repos/${REPO}/dispatches" \
            --field event_type="firebase-deployment-succeeded" \
            --field client_payload[sha]="${{ github.sha }}" \
            --field client_payload[ref]="${{ github.ref }}"
          echo "==> Docker build pipeline triggered."
