name: CI/CD Pipeline

on:
  # For PRs: run quality checks (no Firebase gate needed, no Docker build)
  pull_request:
    branches: [ "main" ]
  # For pushes to main: only triggered by firebase-gate.yml AFTER Firebase succeeds
  # DO NOT add 'push' here — that would run this in parallel with Firebase
  repository_dispatch:
    types: [ firebase-deployment-succeeded ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # QUALITY CHECK
  # Runs on PRs for fast feedback, and also on repository_dispatch (after Firebase).
  # ─────────────────────────────────────────────────────────────────────────────
  quality-check:
    name: Quality Check (Lint & Test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────────
  # DOCKER BUILD & PUSH
  # Only runs after Firebase gate dispatches the event (push to main).
  # Never runs on PRs.
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-publish:
    name: Build, Scan & Push Docker Image
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.event_name == 'repository_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ secrets.DOCKER_USERNAME }}/famio-web:${{ github.event.client_payload.sha }}

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/famio-web:${{ github.event.client_payload.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          scanners: 'vuln'
          severity: 'CRITICAL,HIGH'
          skip-dirs: '/app/node_modules'

      - name: Push to Docker Hub
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/famio-web:${{ github.event.client_payload.sha }}
            ${{ secrets.DOCKER_USERNAME }}/famio-web:latest
