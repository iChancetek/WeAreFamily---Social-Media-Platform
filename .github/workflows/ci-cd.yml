name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 1: Wait for Firebase App Hosting to finish deploying
  # This is the first gate. Nothing else runs until Firebase succeeds.
  # ─────────────────────────────────────────────────────────────────────────────
  wait-for-firebase:
    name: Wait for Firebase App Hosting
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: '>= 363.0.0'

      - name: Wait for Firebase App Hosting Rollout to Succeed
        run: |
          echo "==> Firebase App Hosting build triggered by this push. Waiting for it to complete..."
          # Give Firebase Cloud Build ~60 seconds to register the new rollout before we start polling
          sleep 60

          MAX_RETRIES=60  # 60 retries x 10s = up to 10 minutes
          RETRY_COUNT=0
          ROLLOUT_SUCCESS=false

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            STATE=$(gcloud firebase apphosting rollouts list \
              --backend=wearefamily \
              --location=us-east4 \
              --limit=1 \
              --format="value(state)")

            echo "  Firebase rollout state: ${STATE} (attempt $((RETRY_COUNT+1))/$MAX_RETRIES)"

            if [ "$STATE" = "SUCCEEDED" ] || [ "$STATE" = "COMPLETED" ]; then
              echo "==> Firebase App Hosting deployed successfully! Proceeding."
              ROLLOUT_SUCCESS=true
              break
            elif [ "$STATE" = "FAILED" ] || [ "$STATE" = "CANCELLED" ]; then
              echo "==> Firebase App Hosting deployment FAILED or was CANCELLED. Aborting pipeline."
              exit 1
            fi

            echo "  Still deploying... retrying in 10 seconds."
            sleep 10
            RETRY_COUNT=$((RETRY_COUNT+1))
          done

          if [ "$ROLLOUT_SUCCESS" = false ]; then
            echo "==> Timed out waiting for Firebase App Hosting deployment. Aborting pipeline."
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 2: Run code quality checks
  # Only starts after Firebase successfully deploys.
  # ─────────────────────────────────────────────────────────────────────────────
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    needs: wait-for-firebase
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 3: Build and publish Docker image
  # Only starts after quality-check passes (which requires Firebase to succeed).
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-publish:
    name: Build, Scan & Push Docker Image
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ secrets.DOCKER_USERNAME }}/famio-web:${{ github.sha }}

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/famio-web:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          scanners: 'vuln'
          severity: 'CRITICAL,HIGH'
          skip-dirs: '/app/node_modules'

      - name: Push to Docker Hub
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/famio-web:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/famio-web:latest
