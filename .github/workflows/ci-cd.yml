name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # This event is fired by the firebase-gate.yml workflow after Firebase succeeds
  repository_dispatch:
    types: [ firebase-deployment-succeeded ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # QUALITY CHECK: Runs on push/PR to give fast feedback on code quality
  # ─────────────────────────────────────────────────────────────────────────────
  quality-check:
    name: Quality Check (Lint & Test)
    runs-on: ubuntu-latest
    # Skip this on repository_dispatch since it already passed on the original push
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────────
  # DOCKER BUILD: Only runs when triggered by firebase-gate.yml after Firebase
  # App Hosting has confirmed a successful deployment.
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-publish:
    name: Build, Scan & Push Docker Image
    runs-on: ubuntu-latest
    # Only run when explicitly triggered by the firebase gate workflow
    if: github.event_name == 'repository_dispatch' && github.event.action == 'firebase-deployment-succeeded'
    steps:
      - name: Checkout code
        # Use the SHA from the dispatch payload so we build the correct commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ secrets.DOCKER_USERNAME }}/famio-web:${{ github.event.client_payload.sha }}

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/famio-web:${{ github.event.client_payload.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          scanners: 'vuln'
          severity: 'CRITICAL,HIGH'
          skip-dirs: '/app/node_modules'

      - name: Push to Docker Hub
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/famio-web:${{ github.event.client_payload.sha }}
            ${{ secrets.DOCKER_USERNAME }}/famio-web:latest
