name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

  build-and-publish:
    name: Build, Scan & Push
    needs: quality-check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Wait for Google Cloud Firebase App Hosting to deploy successfully first
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: '>= 363.0.0'

      - name: Wait for Firebase App Hosting Rollout
        run: |
          echo "Waiting for Firebase App Hosting rollout to complete..."
          # The rollout might take a few seconds to start after the GitHub push
          sleep 30
          
          MAX_RETRIES=60 # 60 * 10s = 10 minutes max wait
          RETRY_COUNT=0
          ROLLOUT_SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            # Get the latest rollout state using gcloud firebase
            # App Hosting uses the standard format locations/[region]/backends/[backend]/rollouts
            STATE=$(gcloud firebase apphosting rollouts list --backend=wearefamily --location=us-east4 --limit=1 --format="value(state)")
            
            echo "Current rollout state: $STATE"
            
            if [ "$STATE" = "SUCCEEDED" ] || [ "$STATE" = "COMPLETED" ]; then
              echo "Firebase App Hosting deployment completed successfully!"
              ROLLOUT_SUCCESS=true
              break
            elif [ "$STATE" = "FAILED" ] || [ "$STATE" = "CANCELLED" ]; then
              echo "Firebase App Hosting deployment failed or was cancelled."
              exit 1
            fi
            
            echo "Deployment still in progress... waiting 10 seconds."
            sleep 10
            RETRY_COUNT=$((RETRY_COUNT+1))
          done
          
          if [ "$ROLLOUT_SUCCESS" = false ]; then
            echo "Timed out waiting for Firebase App Hosting deployment."
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ secrets.DOCKER_USERNAME }}/famio-web:${{ github.sha }}

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/famio-web:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          scanners: 'vuln'
          severity: 'CRITICAL,HIGH'
          skip-dirs: '/app/node_modules'

      - name: Push to Docker Hub
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/famio-web:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/famio-web:latest
